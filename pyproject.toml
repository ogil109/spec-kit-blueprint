[project]
name = "spec-kit-blueprint"
version = "0.1.2"
description = "Blueprint — a Spec Kit extension: a living architecture map kept honest by a deterministic, machine-first CI gate."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
dependencies = []

# The extension itself is pure bash + git and ships no Python. This project file
# exists only to pin the *development* toolchain (commit conventions, releases).
[tool.uv]
package = false

[dependency-groups]
dev = [
  "commitizen>=4.1",
]

[tool.commitizen]
name = "cz_conventional_commits"
version_provider = "pep621"
tag_format = "v$version"
version_files = [
  "extension.yml:^  version:",
]
update_changelog_on_bump = true
changelog_incremental = true
changelog_merge_prerelease = true
major_version_zero = true

# CHANGELOG.md is fully generated from Conventional Commit subjects — do not
# hand-edit it, cz owns the whole file and rewrites it on every bump. Release
# narrative (the "why", the caveats) belongs in the GitHub release notes, not here.
# Section names below apply to what cz writes. Conventional commits only let
# feat/fix/refactor/perf/BREAKING CHANGE through — a user-visible documentation
# error is a `fix`, not a `docs`, if it belongs in the changelog at all.
[tool.commitizen.change_type_map]
feat = "Added"
fix = "Fixed"
refactor = "Changed"
perf = "Changed"
