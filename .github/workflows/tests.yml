name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: blueprint gate tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run deterministic test suites (bash + git + python3, no other deps)
        run: |
          set -e
          bash tests/oracle_test.sh
          bash tests/check_remap_test.sh
          bash tests/harness_loop_test.sh

  commits:
    name: commit conventions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
      # Scoped to this PR's commits: the pre-convention initial commit predates
      # commitizen and would fail a whole-history check.
      - name: Validate commit messages (commitizen)
        run: >
          uv run cz check
          --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
