schema_version: "1.0"

extension:
  id: blueprint-index
  name: "Blueprint Index — Living Architecture Map"
  version: "0.1.3"
  description: "A living architecture map for spec-driven projects, kept honest by a deterministic, low-friction, machine-first CI gate (JSON output, self-healable) that blocks only when the map contradicts the specs or code — and warns, without blocking, on the rest. Brownfield or greenfield."
  category: process
  effect: read-write
  author: ogil109
  repository: https://github.com/ogil109/spec-kit-blueprint
  license: MIT
  homepage: https://github.com/ogil109/spec-kit-blueprint/tree/main

requires:
  speckit_version: ">=0.10.0"

provides:
  commands:
    - name: speckit.blueprint-index.init
      file: commands/speckit.blueprint-index.init.md
      description: "Scaffold the architecture map — seed from a design doc (greenfield) or reverse-map existing code (--from-code, brownfield)"
    - name: speckit.blueprint-index.status
      file: commands/speckit.blueprint-index.status.md
      description: "Show the map's coherence state: detailed vs settled sections, distill drift, and where each spec stands"
    - name: speckit.blueprint-index.distill
      file: commands/speckit.blueprint-index.distill.md
      description: "Collapse a finished spec's section to an at-a-glance digest + pointer, and stamp the slice's code baseline so drift can be detected"
    - name: speckit.blueprint-index.remap
      file: commands/speckit.blueprint-index.remap.md
      description: "Re-derive a section from current code and refresh its git baseline — resync the map after out-of-band code changes (run the check gate in CI to detect them)"

  config:
    - name: "blueprint-config.yml"
      template: "config-template.yml"
      description: "Blueprint location and distillation behavior"
      required: false

  scripts:
    - "scripts/bash/blueprint-state.sh"
    - "scripts/powershell/blueprint-state.ps1"

tags:
  - "blueprint"
  - "architecture"
  - "coherence"
  - "drift"
  - "brownfield"
  - "autonomous"
  - "ci"

defaults:
  blueprint:
    path: ".specify/memory/blueprint.md"
  distill:
    require_confirmation: true
